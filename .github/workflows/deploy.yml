name: Deploy

on:
  push:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install -r backend/requirements.txt
      - run: python -c "from backend.ark_client import ArkClient; print('✅ 导入成功')"
