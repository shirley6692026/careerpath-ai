server {
    listen 80;
    server_name careerpath-ai.example.com;
    
    location / {
        root /var/www/careerpath-ai;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    location /api {
        proxy_pass http://localhost:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
